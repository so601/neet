<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>早押しクイズゲーム</title>
<style>
    body {
        font-family: sans-serif;
        text-align: center;
        background: #f0f0f0;
    }
    .container {
        margin-top: 50px;
        padding: 20px;
        background: white;
        border-radius: 10px;
        display: inline-block;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    button {
        padding: 10px 20px;
        font-size: 18px;
        margin: 10px;
        cursor: pointer;
    }
    #question {
        font-size: 20px;
        margin: 20px 0;
    }
    #result {
        font-weight: bold;
        margin-top: 20px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>早押しクイズゲーム</h1>
    <div id="question">スタートボタンを押してね</div>
    <button onclick="startGame()">スタート</button>
    <button onclick="buzz()">早押し！</button>
    <div id="result"></div>
    <div id="score">スコア: 0</div>
</div>

<script>
const quiz = [
    { q: "日本の首都は？", a: "東京" },
    { q: "1+1は？", a: "2" },
    { q: "富士山の高さ（約）は？", a: "3776" },
    { q: "りんごの色は？", a: "赤" }
];

let current = 0;
let score = 0;
let answering = false;

function startGame() {
    current = 0;
    score = 0;
    document.getElementById("score").textContent = "スコア: 0";
    nextQuestion();
}

function nextQuestion() {
    if (current >= quiz.length) {
        document.getElementById("question").textContent = "終了！";
        document.getElementById("result").textContent = "最終スコア: " + score;
        return;
    }
    document.getElementById("question").textContent = quiz[current].q;
    document.getElementById("result").textContent = "";
    answering = true;
}

function buzz() {
    if (!answering) return;

    let userAnswer = prompt("答えを入力！");
    if (userAnswer === null) return;

    if (userAnswer === quiz[current].a) {
        document.getElementById("result").textContent = "正解！";
        score++;
    } else {
        document.getElementById("result").textContent = "不正解！正解は " + quiz[current].a;
    }

    document.getElementById("score").textContent = "スコア: " + score;
    answering = false;
    current++;

    setTimeout(nextQuestion, 1000);
}
</script>

</body>
</html>
